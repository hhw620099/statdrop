<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e03a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffccb0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="60" height="60" rx="14" fill="url(#bgGrad)"/>

  <!-- Bar chart bars -->
  <rect x="8" y="36" width="8" height="16" rx="2" fill="white" opacity="0.3"/>
  <rect x="19" y="26" width="8" height="26" rx="2" fill="white" opacity="0.5"/>
  <rect x="30" y="18" width="8" height="34" rx="2" fill="white" opacity="0.7"/>

  <!-- Drop / ball shape on top of tallest bar -->
  <circle cx="34" cy="13" r="6" fill="url(#dropGrad)"/>
  <!-- Upward arrow through the drop -->
  <line x1="34" y1="17" x2="34" y2="8" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <polyline points="31,11 34,7 37,11" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small lightning bolt accent bottom right -->
  <polygon points="46,30 42,40 45,40 41,52 49,38 46,38" fill="white" opacity="0.85"/>
</svg>
